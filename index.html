<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#173f73">
  <meta name="description" content="Tino 多旅行現場行程 App">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="旅行行程">
  <title>Tino 旅行管理</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero" id="hero">
      <div class="hero-top">
        <div><p class="eyebrow" id="brandLine"></p><h1 id="heroTitle"></h1></div>
        <div class="hero-actions"><span class="app-status" id="appStatus" data-tone="saved">✓ 已儲存</span><button class="round-button" id="editToggle" aria-label="切換編輯模式">編輯</button><button class="round-button" id="installBtn" aria-label="安裝 App" hidden>＋</button></div>
      </div>
      <p class="hero-copy" id="heroSubtitle"></p>
      <div class="trip-facts" id="tripFacts"></div>
      <div class="trip-switcher"><select id="tripSelect" aria-label="切換旅行"></select><button id="newTrip" class="mini-button">新增旅行</button><button id="copyTrip" class="mini-button">複製</button></div>
    </header>
    <main>
      <section class="view active" id="homeView" aria-label="旅行總覽"><div id="homePanel"></div></section>
      <section class="view" id="scheduleView" aria-label="每日行程"><nav class="day-tabs schedule-tabs" id="dayTabs" aria-label="選擇行程日期"></nav><div class="day-summary" id="daySummary"></div><div class="timeline" id="timeline"></div></section>
      <section class="view map-view" id="mapView" aria-label="地圖"><div class="map-toolbar"><button class="tool-button" id="fitMap">顯示全部</button><a class="tool-button primary" id="openDayMap" target="_blank" rel="noopener">Google Maps</a></div><nav class="map-day-tabs" id="mapDayTabs" aria-label="選擇地圖日期"></nav><div class="map-status" id="mapStatus" hidden></div><div id="map" role="application" aria-label="旅行景點地圖"></div><p class="map-fallback" id="mapFallback" hidden>地圖需要網路載入；行程文字仍可離線查看。</p></section>
      <section class="view info-view" id="settingsView" aria-label="旅行設定"><div class="section-heading"><p class="eyebrow dark">TRIP SETTINGS</p><h2>旅行設定與資料</h2></div><div id="settingsPanel"></div></section>
    </main>
    <nav class="bottom-nav" aria-label="主要功能"><button class="nav-item active" data-view="homeView"><span>⌂</span>總覽</button><button class="nav-item" data-view="scheduleView"><span>☷</span>行程</button><button class="nav-item" data-view="mapView"><span>⌖</span>地圖</button><button class="nav-item" data-view="settingsView"><span>⚙</span>設定</button></nav>
    <input id="importFile" type="file" accept="application/json,.json" hidden>
    <input id="restoreFile" type="file" accept="application/json,.json" hidden>
    <input id="coverPhotoInput" type="file" accept="image/jpeg,image/png,image/webp" hidden>
  </div>
  <button class="app-update" id="updateApp" type="button" hidden aria-live="polite">↑ 有新版</button>
  <div class="stop-sheet" id="stopSheet" hidden aria-hidden="true"><div class="sheet-backdrop" data-close-sheet></div><section class="sheet-panel" role="dialog" aria-modal="true" aria-labelledby="sheetTitle"><div class="sheet-handle"></div><div class="sheet-head"><h2 id="sheetTitle">新增景點</h2><button class="sheet-close" data-close-sheet aria-label="關閉">×</button></div><form id="stopForm"><div class="sheet-fields"><label>時間<input type="time" name="time"></label><label class="place-search-field">景點名稱<input name="name" id="placeSearchInput" required autocomplete="off" placeholder="例如：唐吉軻德"><small class="search-hint">輸入 2 個字，自動搜尋附近地點</small><div class="place-results" id="placeResults" role="listbox" hidden></div><span class="search-status" id="placeSearchStatus" aria-live="polite"></span><button class="search-retry" id="retryPlaceSearch" type="button" hidden>改用備援搜尋</button><a class="google-place-search" id="googlePlaceSearch" href="https://www.google.com/maps" target="_blank" rel="noopener">在 Google Maps 搜尋 ↗</a></label><label>交通方式<input name="transport" placeholder="例如：步行、地鐵"></label><label>實際花費（日圓）<input name="expense" type="number" inputmode="numeric" min="0" step="1" placeholder="例如：1200"></label></div><button type="button" class="more-settings" id="moreSettings">更多設定⌄</button><div class="sheet-fields more-fields" id="moreFields" hidden><label class="full">安排日期<select name="targetDay" id="targetDaySelect"></select></label><label class="full">Google Maps 分享連結<input name="mapUrl" id="mapUrlInput" inputmode="url" placeholder="貼上完整 Google Maps 網址"><small class="field-help" id="mapParseStatus">完整網址可嘗試帶入店名與座標</small><button class="parse-map-link" id="parseMapLink" type="button">解析並回填</button></label><label>類型<input list="typeList" name="type" value="景點"></label><label>緯度<input inputmode="decimal" name="lat"></label><label>經度<input inputmode="decimal" name="lng"></label><label>移動時間<input name="duration"></label><label class="full">說明<textarea name="note"></textarea></label><label>長輩提醒<input name="elder"></label><label>幼兒提醒<input name="kid"></label><label class="full">備案<input name="backup"></label></div><button class="sheet-save" type="submit">儲存景點</button></form></section></div>
  <div class="trip-wizard" id="tripWizard" hidden aria-hidden="true"><div class="sheet-backdrop" data-close-wizard></div><section class="wizard-panel" role="dialog" aria-modal="true" aria-labelledby="wizardTitle"><div class="sheet-handle"></div><div class="sheet-head"><div><p class="wizard-progress" id="wizardProgress">步驟 1／3</p><h2 id="wizardTitle">建立新旅行</h2></div><button class="sheet-close" data-close-wizard aria-label="關閉">×</button></div><form id="tripWizardForm"><fieldset class="wizard-step" data-wizard-step="0"><legend>先決定去哪裡</legend><label>旅行名稱<input name="title" required placeholder="例如：東京親子旅行"></label><label>城市<input name="city" required placeholder="例如：東京"></label></fieldset><fieldset class="wizard-step" data-wizard-step="1" hidden><legend>旅行日期</legend><label>開始日期<input name="startDate" type="date" required></label><label>結束日期<input name="endDate" type="date" required></label><p class="wizard-tip">App 會依日期自動建立每天的空白行程。</p></fieldset><fieldset class="wizard-step" data-wizard-step="2" hidden><legend>加入同行與住宿</legend><label>同行成員摘要<input name="members" placeholder="例如：2 大 1 小"></label><label>住宿<input name="hotel" placeholder="可以稍後再填"></label></fieldset><div class="wizard-actions"><button type="button" id="wizardBack" hidden>上一步</button><button type="button" id="wizardNext">下一步</button><button type="submit" id="wizardCreate" hidden>建立旅行</button></div></form></section></div><div class="snackbar" id="snackbar" role="status" aria-live="polite" hidden></div>
  <div class="restore-sheet" id="restoreSheet" hidden aria-hidden="true"><div class="sheet-backdrop" data-close-restore></div><section class="restore-panel" role="dialog" aria-modal="true" aria-labelledby="restoreTitle"><div class="sheet-handle"></div><div class="sheet-head"><div><p class="wizard-progress">RESTORE PREVIEW</p><h2 id="restoreTitle">確認完整備份</h2></div><button class="sheet-close" data-close-restore aria-label="關閉">×</button></div><div id="restorePreview"></div><div class="restore-warning"><b>取代目前資料</b><span>會先檢查完整檔案，再用備份內容取代此裝置中的所有旅行。</span></div><div class="restore-actions"><button id="mergeRestore" type="button">合併旅行</button><button id="replaceRestore" class="danger" type="button">取代目前資料</button></div></section></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="./data.js"></script>
  <script src="./itinerary-core.js"></script>
  <script src="./app.js"></script>
</body>
</html>
