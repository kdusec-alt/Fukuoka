<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#173f73">
  <meta name="description" content="Tino 多旅行現場行程 App">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="旅行行程">
  <title>Tino 旅行管理</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero" id="hero">
      <div class="hero-top">
        <div><p class="eyebrow" id="brandLine"></p><h1 id="heroTitle"></h1></div>
        <div class="hero-actions"><button class="round-button" id="editToggle" aria-label="切換編輯模式">編輯</button><button class="round-button" id="installBtn" aria-label="安裝 App" hidden>＋</button></div>
      </div>
      <p class="hero-copy" id="heroSubtitle"></p>
      <div class="trip-facts" id="tripFacts"></div>
      <div class="trip-switcher"><select id="tripSelect" aria-label="切換旅行"></select><button id="newTrip" class="mini-button">新增旅行</button><button id="copyTrip" class="mini-button">複製</button></div>
      <nav class="day-tabs" id="dayTabs" aria-label="選擇行程日期"></nav>
    </header>
    <main>
      <section class="view active" id="homeView" aria-label="旅行總覽"><div id="homePanel"></div></section>
      <section class="view" id="scheduleView" aria-label="每日行程"><div class="day-summary" id="daySummary"></div><div class="timeline" id="timeline"></div></section>
      <section class="view map-view" id="mapView" aria-label="地圖"><div class="map-toolbar"><button class="tool-button" id="fitMap">顯示全部</button><a class="tool-button primary" id="openDayMap" target="_blank" rel="noopener">Google Maps</a></div><div id="map" role="application" aria-label="當日景點地圖"></div><p class="map-fallback" id="mapFallback" hidden>地圖需要網路載入；行程文字仍可離線查看。</p></section>
      <section class="view info-view" id="settingsView" aria-label="旅行設定"><div class="section-heading"><p class="eyebrow dark">TRIP SETTINGS</p><h2>旅行設定與資料</h2></div><div id="settingsPanel"></div></section>
    </main>
    <nav class="bottom-nav" aria-label="主要功能"><button class="nav-item active" data-view="homeView"><span>⌂</span>總覽</button><button class="nav-item" data-view="scheduleView"><span>☷</span>行程</button><button class="nav-item" data-view="mapView"><span>⌖</span>地圖</button><button class="nav-item" data-view="settingsView"><span>⚙</span>設定</button></nav>
    <input id="importFile" type="file" accept="application/json,.json" hidden>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
